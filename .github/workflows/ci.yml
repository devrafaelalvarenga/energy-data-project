name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17 (requerido pelo PySpark)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependências
        working-directory: energy_data_project
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        working-directory: energy_data_project
        run: ruff check src/

      - name: Type check (mypy)
        working-directory: energy_data_project
        run: mypy src/lakehouse/

      - name: Testes unitários
        working-directory: energy_data_project
        run: pytest tests/unit/ -v --cov=src/lakehouse --cov-report=term-missing
