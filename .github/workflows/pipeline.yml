name: Pipeline

on:
  workflow_dispatch:
    inputs:
      dataset:
        description: "Nome do dataset a ingerir"
        required: true
        default: indicadores_aneel

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependências
        working-directory: energy_data_project
        run: pip install -e ".[dev]"

      - name: Bronze — Ingestão
        working-directory: energy_data_project
        run: lakehouse ingest --dataset ${{ github.event.inputs.dataset }}

      - name: Silver — Processamento
        working-directory: energy_data_project
        run: lakehouse silver

      - name: Gold — DBT run
        working-directory: energy_data_project
        run: lakehouse gold

      - name: Gold — DBT test
        working-directory: energy_data_project/dbt
        run: dbt test
